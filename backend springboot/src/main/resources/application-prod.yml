server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET time_zone = '+00:00'

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off
    org.springframework.security: info

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    issuer: "attendance-api"
    secret: ${JWT_SECRET}
    accessTokenMinutes: 15
    refreshTokenDays: 30

  auth:
    password-reset:
      token-minutes: 30
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL}
      rate-limit:
        redis-key-prefix: "auth:password-reset:rl:prod"
        window-minutes: 60
        max-requests-per-email: 3
        max-requests-per-ip: 20
        fail-open: false

    email-outbox:
      enabled: true
      poll-delay-ms: 3000
      batch-size: 50
      max-attempts: 8
      base-backoff-seconds: 30
      encryption-key-base64: ${EMAIL_OUTBOX_ENCRYPTION_KEY_BASE64}

    login-rate-limit:
      redis-key-prefix: "auth:login:rl:prod"
      window-minutes: 15
      max-requests-per-ip: 20
      max-requests-per-email-ip: 5
      fail-open: false