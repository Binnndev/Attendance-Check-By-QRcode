server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET time_zone = '+00:00'

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off
    org.springframework.security: info

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    issuer: "attendance-api"
    secret: ${JWT_SECRET}
    accessTokenMinutes: 15
    refreshTokenDays: 30

  mail:
    from-address: ${MAIL_FROM_ADDRESS}
    from-name: ${MAIL_FROM_NAME:Attendance System}

  auth:
    password-reset:
      token-minutes: 30
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL}
      rate-limit-window-minutes: 60
      max-requests-per-window-per-email: 3
      max-requests-per-window-per-ip: 20