server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3306/qr_attendance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET time_zone = '+00:00'

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.transaction.jta.platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

logging:
  level:
    org.flywaydb: INFO

app:
  jwt:
    issuer: "attendance-api-dev"
    secret: "CHANGE_ME_DEV_32_CHARS_MINIMUM_SECRET"
    accessTokenMinutes: 15
    refreshTokenDays: 30

  auth:
    password-reset:
      token-minutes: 30
      frontend-reset-url: "http://localhost:3000/reset-password"
      rate-limit:
        redis-key-prefix: "auth:password-reset:rl"
        window-minutes: 60
        max-requests-per-email: 3
        max-requests-per-ip: 20
        fail-open: true